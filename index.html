<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Clash</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    #turn {
      font-size: 22px;
      margin: 15px 0;
      color: gold;
      font-weight: bold;
    }

    #message {
      min-height: 28px;
      margin: 10px 0;
      font-size: 18px;
      color: #9fe870;
      font-weight: bold;
    }

    #win {
      display: none;
      font-size: 24px;
      margin: 15px 0;
      color: lightgreen;
      font-weight: bold;
    }

    .scoreboard {
      max-width: 900px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .player-box {
      background: #151c33;
      border: 2px solid #2d3a66;
      border-radius: 10px;
      padding: 10px;
      transition: 0.3s;
    }

    .player-box.active {
      border-color: orange;
      box-shadow: 0 0 12px orange;
      transform: scale(1.03);
    }

    .player-name {
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    .player-score {
      font-size: 22px;
      color: lightgreen;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: #1c2546;
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      border: 2px solid #32406f;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .card .back {
      font-size: 32px;
      color: white;
      font-weight: bold;
    }

    .card.flipped img,
    .card.matched img {
      display: block;
    }

    .card.flipped .back,
    .card.matched .back {
      display: none;
    }

    .card.matched {
      border-color: lightgreen;
      box-shadow: 0 0 10px lightgreen;
      cursor: default;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      background: #18213f;
      border: 2px solid #3a4c87;
      border-radius: 14px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
    }

    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: gold;
    }

    .option-btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #d9e2ff;
      color: #111;
    }

    @media (max-width: 768px) {
      .scoreboard {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>Memory Clash</h1>
  <button onclick="startGame()">Restart Game</button>

  <div id="turn">Turn: Player 1</div>
  <div id="message"></div>

  <div class="scoreboard" id="scoreboard"></div>
  <div id="win"></div>
  <div class="grid" id="grid"></div>

  <div class="modal" id="quizModal">
    <div class="modal-content">
      <h3>What type of celestial object is this?</h3>
      <div id="quizOptions"></div>
    </div>
  </div>

  <script>
    const uniqueCards = [
      { file: "images.jfif", type: "Star" },
      { file: "images (2).jfif", type: "Black Hole" },
      { file: "images (1).jfif", type: "Coma Cluster" },
      { file: "hqdefault.jpg", type: "Star" },
      { file: "download.jfif", type: "Coma Cluster" },
      { file: "download (4).jfif", type: "Black Hole" },
      { file: "download (3).jfif", type: "Galaxy" },
      { file: "download (2).jfif", type: "Galaxy" },
      { file: "download (1).jfif", type: "Nebula" }
    ];

    const quizChoices = [
      "Star",
      "Nebula",
      "Galaxy",
      "Black Hole",
      "Coma Cluster"
    ];

    const totalPlayers = 5;
    let scores = new Array(totalPlayers).fill(0);
    let currentPlayer = 0;

    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let matches = 0;
    let pendingMatchedPair = null;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderScoreboard() {
      const scoreboard = document.getElementById("scoreboard");
      scoreboard.innerHTML = "";

      for (let i = 0; i < totalPlayers; i++) {
        const box = document.createElement("div");
        box.className = "player-box" + (i === currentPlayer ? " active" : "");
        box.innerHTML = `
          <div class="player-name">Player ${i + 1}</div>
          <div class="player-score">${scores[i]}</div>
        `;
        scoreboard.appendChild(box);
      }

      document.getElementById("turn").textContent = `Turn: Player ${currentPlayer + 1}`;
    }

    function nextPlayer() {
      currentPlayer = (currentPlayer + 1) % totalPlayers;
      renderScoreboard();
    }

    function setMessage(text, color = "#9fe870") {
      const msg = document.getElementById("message");
      msg.textContent = text;
      msg.style.color = color;
    }

    function startGame() {
      const grid = document.getElementById("grid");
      const winText = document.getElementById("win");

      grid.innerHTML = "";
      winText.style.display = "none";
      winText.textContent = "";

      scores = new Array(totalPlayers).fill(0);
      currentPlayer = 0;
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      matches = 0;
      pendingMatchedPair = null;

      setMessage("");
      renderScoreboard();

      const doubledCards = [...uniqueCards, ...uniqueCards];
      const gameCards = shuffle(doubledCards);

      gameCards.forEach((cardData, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.file = cardData.file;
        card.dataset.type = cardData.type;
        card.dataset.id = index;

        const back = document.createElement("div");
        back.className = "back";
        back.textContent = "?";

        const img = document.createElement("img");
        img.src = cardData.file;
        img.alt = cardData.type;

        card.appendChild(back);
        card.appendChild(img);

        card.addEventListener("click", () => flipCard(card));
        grid.appendChild(card);
      });
    }

    function flipCard(card) {
      if (
        lockBoard ||
        card === firstCard ||
        card.classList.contains("matched") ||
        card.classList.contains("flipped")
      ) {
        return;
      }

      card.classList.add("flipped");

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      lockBoard = true;

      if (firstCard.dataset.file === secondCard.dataset.file) {
        pendingMatchedPair = {
          card1: firstCard,
          card2: secondCard,
          correctType: firstCard.dataset.type
        };
        showQuiz();
      } else {
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
          nextPlayer();
          setMessage(`Wrong match. Turn: Player ${currentPlayer + 1}`, "#ff8080");
        }, 900);
      }
    }

    function showQuiz() {
      const modal = document.getElementById("quizModal");
      const optionsBox = document.getElementById("quizOptions");
      optionsBox.innerHTML = "";

      const shuffledChoices = shuffle(quizChoices);

      shuffledChoices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = choice;
        btn.onclick = () => answerQuiz(choice);
        optionsBox.appendChild(btn);
      });

      modal.style.display = "flex";
    }

    function answerQuiz(selectedAnswer) {
      const modal = document.getElementById("quizModal");
      modal.style.display = "none";

      const { card1, card2, correctType } = pendingMatchedPair;

      card1.classList.remove("flipped");
      card2.classList.remove("flipped");
      card1.classList.add("matched");
      card2.classList.add("matched");

      matches++;

      if (selectedAnswer === correctType) {
        scores[currentPlayer] += 1;
        setMessage(
          `Correct! It is ${correctType}. Player ${currentPlayer + 1} gets +1 point and plays again!`,
          "#9fe870"
        );

        renderScoreboard();
        resetTurn();

        if (matches === uniqueCards.length) {
          endGame();
        }

        return;
      } else {
        scores[currentPlayer] -= 1;
        setMessage(
          `Wrong! It was ${correctType}. Player ${currentPlayer + 1} gets -1 point.`,
          "#ff8080"
        );

        renderScoreboard();
        resetTurn();

        if (matches === uniqueCards.length) {
          endGame();
          return;
        }

        nextPlayer();
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      pendingMatchedPair = null;
    }

    function endGame() {
      const winText = document.getElementById("win");
      const maxScore = Math.max(...scores);

      const winners = [];
      for (let i = 0; i < scores.length; i++) {
        if (scores[i] === maxScore) {
          winners.push(`Player ${i + 1}`);
        }
      }

      winText.style.display = "block";

      if (winners.length === 1) {
        winText.textContent = `Winner: ${winners[0]} with ${maxScore} point(s)!`;
      } else {
        winText.textContent = `Draw between ${winners.join(", ")} with ${maxScore} point(s)!`;
      }
    }

    startGame();
  </script>

</body>
</html>
